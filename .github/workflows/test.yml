name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      uptime-kuma:
        image: louislam/uptime-kuma:2
        ports:
          - 3001:3001
        env:
          UPTIME_KUMA_DB_TYPE: sqlite
          # TODO: investigate disabling Uptime Kuma's login rate limiter for test runs
          # (back-to-back test runs locally hit "Too frequently, try again later")
        options: >-
          --health-cmd="curl -fL http://localhost:3001 || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Wait for Uptime Kuma to be ready
        run: |
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            status_code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001 || echo "000")
            if [ "$status_code" = "200" ] || [ "$status_code" = "302" ]; then
              echo "Uptime Kuma is ready"
              exit 0
            fi
            echo "Attempt $((attempt + 1))/$max_attempts - Status: $status_code"
            sleep 2
            attempt=$((attempt + 1))
          done
          echo "Uptime Kuma failed to start"
          exit 1

      - name: Run tests
        run: python -m unittest discover -s tests
